<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guardian Genetics Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--primary:#0052cc;--primary-dark:#003d99;--primary-light:#e8f0fe;--primary-mid:#4d8ff5;--teal:#00897b;--teal-light:#e0f2f1;--navy:#0a1f44;--white:#fff;--gray-50:#f7f9fc;--gray-100:#eef1f6;--gray-200:#dde3ee;--gray-300:#c4cdd9;--gray-400:#8f9fae;--gray-500:#6b7a8d;--gray-600:#4a5568;--gray-700:#2d3748;--gray-800:#1a202c;--success:#00a651;--success-light:#e6f7ee;--warning:#f59e0b;--warning-light:#fffbeb;--danger:#e53e3e;--danger-light:#fff5f5;--sidebar-w:260px;--topbar-h:64px;--radius:10px;--radius-sm:6px;--radius-lg:16px;--shadow-xs:0 1px 2px rgba(0,0,0,.05);--shadow-sm:0 2px 8px rgba(0,0,0,.06);--shadow:0 4px 16px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.12);--t:all .2s ease}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}body{font-family:'Outfit',sans-serif;background:var(--gray-50);color:var(--gray-700);line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:'Outfit',sans-serif;cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:'Outfit',sans-serif;outline:none}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px}

/* AUTH */
.auth-wrap{min-height:100vh;display:grid;grid-template-columns:480px 1fr}
.auth-form-side{display:flex;flex-direction:column;justify-content:center;align-items:center;padding:48px 40px;background:white}
.auth-form-inner{width:100%;max-width:360px}
.auth-brand{display:flex;align-items:center;gap:10px;margin-bottom:40px}
.auth-brand-mark{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--teal));display:flex;align-items:center;justify-content:center;font-size:20px}
.auth-brand-name{font-size:18px;font-weight:700;color:var(--navy)}
.auth-brand-name span{color:var(--primary)}
.auth-heading{font-family:'Lora',serif;font-size:26px;font-weight:600;color:var(--navy);margin-bottom:6px}
.auth-subheading{font-size:14px;color:var(--gray-500);margin-bottom:28px}
.form-field{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--gray-600);margin-bottom:5px}
.form-control{width:100%;padding:10px 13px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-size:14px;color:var(--gray-800);background:white;transition:var(--t)}
.form-control:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,82,204,.1)}
.form-control::placeholder{color:var(--gray-300)}
.role-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.role-tab{padding:10px 8px;border-radius:var(--radius-sm);border:1.5px solid var(--gray-200);text-align:center;cursor:pointer;transition:var(--t);font-size:13px;font-weight:500;color:var(--gray-500)}
.role-tab:hover{border-color:var(--primary);color:var(--primary)}
.role-tab.active{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}
.role-tab-icon{font-size:20px;display:block;margin-bottom:4px}
.btn-auth{width:100%;padding:12px;background:var(--primary);color:white;border-radius:var(--radius-sm);font-size:15px;font-weight:600;transition:var(--t);border:none;font-family:'Outfit',sans-serif;cursor:pointer}
.btn-auth:hover{background:var(--primary-dark);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,82,204,.3)}
.auth-switch{text-align:center;margin-top:20px;font-size:13px;color:var(--gray-500)}
.auth-switch a{color:var(--primary);font-weight:600;cursor:pointer}
.auth-alert{padding:10px 13px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:14px;display:none}
.auth-alert.error{background:var(--danger-light);color:var(--danger);border:1px solid #fecaca}
.auth-alert.success{background:var(--success-light);color:var(--success);border:1px solid #a7f3d0}
.auth-panel{background:linear-gradient(150deg,var(--navy) 0%,#0a3366 50%,#0d5c6e 100%);display:flex;flex-direction:column;justify-content:center;padding:60px;position:relative;overflow:hidden}
.auth-panel-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:500;color:rgba(255,255,255,.8);margin-bottom:32px;width:fit-content}
.auth-panel-title{font-family:'Lora',serif;font-size:38px;font-weight:600;color:white;line-height:1.2;margin-bottom:16px}
.auth-panel-title em{font-style:italic;color:#7dd3fc}
.auth-panel-desc{font-size:15px;color:rgba(255,255,255,.55);line-height:1.7;max-width:400px;margin-bottom:40px}
.auth-features{display:flex;flex-direction:column;gap:14px}
.auth-feature{display:flex;align-items:center;gap:12px}
.auth-feature-icon{width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.auth-feature-text{font-size:14px;color:rgba(255,255,255,.7)}
.auth-stats-row{display:flex;gap:32px;margin-top:48px;padding-top:32px;border-top:1px solid rgba(255,255,255,.1)}
.auth-stat-num{font-family:'Lora',serif;font-size:28px;color:white}
.auth-stat-lbl{font-size:12px;color:rgba(255,255,255,.4);margin-top:2px}

/* LAYOUT */
.app-layout{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--navy);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:200}
.sidebar-header{height:var(--topbar-h);display:flex;align-items:center;gap:10px;padding:0 20px;border-bottom:1px solid rgba(255,255,255,.07)}
.sidebar-logo-mark{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--primary),var(--teal));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sidebar-logo-text{font-size:15px;font-weight:700;color:white}
.sidebar-logo-text span{color:#7dd3fc}
.sidebar-body{flex:1;overflow-y:auto;padding:12px}
.nav-section-label{font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.25);padding:8px 10px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);font-size:13.5px;font-weight:500;color:rgba(255,255,255,.55);cursor:pointer;transition:var(--t);position:relative;margin-bottom:1px}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9)}
.nav-item.active{background:rgba(0,82,204,.35);color:white}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--primary-mid);border-radius:0 2px 2px 0}
.nav-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--danger);color:white;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.sidebar-footer{border-top:1px solid rgba(255,255,255,.07);padding:14px 16px}
.user-card{display:flex;align-items:center;gap:10px}
.user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--teal));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:white;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:600;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:11px;color:rgba(255,255,255,.35)}
.user-logout{color:rgba(255,255,255,.3);font-size:18px;cursor:pointer;transition:var(--t);padding:4px}
.user-logout:hover{color:var(--danger)}
.topbar{height:var(--topbar-h);background:white;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;padding:0 28px;gap:16px;position:fixed;top:0;left:var(--sidebar-w);right:0;z-index:100;box-shadow:var(--shadow-xs)}
.topbar-title{font-family:'Lora',serif;font-size:18px;font-weight:600;color:var(--navy);flex:1}
.topbar-actions{display:flex;align-items:center;gap:10px}
.topbar-icon-btn{width:36px;height:36px;border-radius:var(--radius-sm);background:var(--gray-50);border:1px solid var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:var(--t);position:relative}
.topbar-icon-btn:hover{background:var(--primary-light);border-color:var(--primary)}
.notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--danger);border:1.5px solid white}
.topbar-divider{width:1px;height:28px;background:var(--gray-200)}
.topbar-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--teal));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;cursor:pointer}
.main{margin-left:var(--sidebar-w);padding-top:var(--topbar-h);min-height:100vh;background:var(--gray-50)}
.page{padding:28px;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;font-family:'Outfit',sans-serif;transition:var(--t);cursor:pointer;border:none;white-space:nowrap}
.btn-primary{background:var(--primary);color:white}.btn-primary:hover{background:var(--primary-dark);box-shadow:0 4px 10px rgba(0,82,204,.25)}
.btn-secondary{background:var(--gray-100);color:var(--gray-700)}.btn-secondary:hover{background:var(--gray-200)}
.btn-outline{background:white;color:var(--primary);border:1.5px solid var(--primary)}.btn-outline:hover{background:var(--primary-light)}
.btn-ghost{background:transparent;color:var(--gray-600)}.btn-ghost:hover{background:var(--gray-100)}
.btn-success{background:var(--success);color:white}.btn-success:hover{background:#008f47}
.btn-danger{background:var(--danger);color:white}
.btn-teal{background:var(--teal);color:white}.btn-teal:hover{background:#00796b}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-lg{padding:11px 22px;font-size:15px}

/* CARDS */
.card{background:white;border-radius:var(--radius);border:1px solid var(--gray-100);box-shadow:var(--shadow-xs)}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 0}
.card-title{font-size:14px;font-weight:700;color:var(--navy)}
.card-subtitle{font-size:12px;color:var(--gray-400);margin-top:1px}
.card-body{padding:16px 20px 20px}
.card-footer{padding:12px 20px;border-top:1px solid var(--gray-100)}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:white;border-radius:var(--radius);border:1px solid var(--gray-100);padding:18px 20px;box-shadow:var(--shadow-xs);transition:var(--t)}
.stat-card:hover{box-shadow:var(--shadow-sm);transform:translateY(-2px)}
.stat-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.stat-icon-wrap{width:40px;height:40px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:18px}
.stat-icon-wrap.blue{background:var(--primary-light)}.stat-icon-wrap.teal{background:var(--teal-light)}.stat-icon-wrap.green{background:var(--success-light)}.stat-icon-wrap.yellow{background:var(--warning-light)}
.stat-trend{font-size:11px;font-weight:600;padding:3px 7px;border-radius:20px}
.stat-trend.up{background:var(--success-light);color:var(--success)}.stat-trend.neutral{background:var(--gray-100);color:var(--gray-500)}
.stat-value{font-family:'Lora',serif;font-size:26px;font-weight:600;color:var(--navy);line-height:1}
.stat-label{font-size:12px;color:var(--gray-500);margin-top:4px}

/* TABLE */
.table-wrap{overflow-x:auto}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table thead th{text-align:left;padding:10px 16px;font-size:11px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.06em;background:var(--gray-50);border-bottom:1px solid var(--gray-100);white-space:nowrap}
.data-table tbody td{padding:12px 16px;border-bottom:1px solid var(--gray-50);color:var(--gray-700);vertical-align:middle}
.data-table tbody tr:last-child td{border-bottom:none}
.data-table tbody tr{transition:var(--t)}
.data-table tbody tr:hover td{background:var(--gray-50)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
.badge-blue{background:#dbeafe;color:#1d4ed8}.badge-green{background:var(--success-light);color:#065f46}.badge-yellow{background:var(--warning-light);color:#92400e}.badge-red{background:var(--danger-light);color:#991b1b}.badge-gray{background:var(--gray-100);color:var(--gray-600)}.badge-teal{background:var(--teal-light);color:#00695c}.badge-purple{background:#f3e8ff;color:#6b21a8}

/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;color:var(--gray-400)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.empty-title{font-size:14px;font-weight:600;color:var(--gray-500);margin-bottom:4px}
.empty-desc{font-size:12px;text-align:center;max-width:220px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(10,31,68,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(2px);animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:white;border-radius:var(--radius-lg);width:100%;max-width:560px;box-shadow:var(--shadow-lg);animation:slideUp .2s ease;max-height:90vh;display:flex;flex-direction:column}
.modal-lg{max-width:760px}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-family:'Lora',serif;font-size:18px;font-weight:600;color:var(--navy)}
.modal-close{width:28px;height:28px;border-radius:50%;background:var(--gray-100);border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--t);color:var(--gray-500)}
.modal-close:hover{background:var(--gray-200)}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1}
.modal-foot{padding:16px 24px;border-top:1px solid var(--gray-100);display:flex;gap:10px;justify-content:flex-end;flex-shrink:0}

/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

/* PAGE HEADER */
.page-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px}
.page-hd-title{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--navy)}
.page-hd-desc{font-size:13px;color:var(--gray-500);margin-top:3px}
.page-hd-actions{display:flex;gap:10px;align-items:center}

/* TOAST */
.toast-wrap{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);animation:toastIn .25s ease;min-width:260px;background:white}
@keyframes toastIn{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}
.toast.success{color:var(--success);border-left:4px solid var(--success)}.toast.error{color:var(--danger);border-left:4px solid var(--danger)}.toast.info{color:var(--primary);border-left:4px solid var(--primary)}
.toast-msg{flex:1;color:var(--gray-700)}

/* WELCOME BANNER */
.welcome-banner{background:linear-gradient(135deg,var(--navy) 0%,#0a3366 60%,#0d5c6e 100%);border-radius:var(--radius-lg);padding:24px 28px;display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;position:relative;overflow:hidden}
.welcome-banner::after{content:'🧬';position:absolute;right:28px;top:50%;transform:translateY(-50%);font-size:72px;opacity:.08}
.welcome-title{font-family:'Lora',serif;font-size:20px;color:white;margin-bottom:4px}
.welcome-sub{font-size:13px;color:rgba(255,255,255,.55)}
.welcome-next{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:var(--radius);padding:12px 16px;text-align:right}
.welcome-next-label{font-size:11px;color:rgba(255,255,255,.45);margin-bottom:2px}
.welcome-next-value{font-size:14px;font-weight:600;color:white}

/* TIMELINE */
.timeline{display:flex;flex-direction:column}
.timeline-item{display:flex;gap:14px;padding:12px 0}
.timeline-item+.timeline-item{border-top:1px solid var(--gray-50)}
.timeline-dot{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;margin-top:2px}
.timeline-dot.blue{background:var(--primary-light)}.timeline-dot.green{background:var(--success-light)}.timeline-dot.yellow{background:var(--warning-light)}.timeline-dot.gray{background:var(--gray-100)}
.timeline-title{font-size:13px;font-weight:600;color:var(--navy)}
.timeline-meta{font-size:12px;color:var(--gray-400);margin-top:2px}

/* PROVIDER CARD */
.provider-card{background:white;border-radius:var(--radius);border:1px solid var(--gray-100);padding:20px;transition:var(--t);cursor:pointer}
.provider-card:hover{box-shadow:var(--shadow-sm);border-color:var(--primary)}
.provider-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--teal));display:flex;align-items:center;justify-content:center;font-family:'Lora',serif;font-size:18px;color:white;margin-bottom:12px}
.provider-name{font-size:14px;font-weight:700;color:var(--navy)}
.provider-spec{font-size:12px;color:var(--gray-500);margin-top:2px;margin-bottom:10px}
.provider-bio{font-size:12px;color:var(--gray-600);line-height:1.6;margin-bottom:12px}

/* SEARCH BAR */
.search-bar{display:flex;align-items:center;gap:10px;background:white;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);padding:8px 14px;transition:var(--t)}
.search-bar:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,82,204,.1)}
.search-bar input{border:none;outline:none;font-size:14px;color:var(--gray-800);width:100%;background:transparent}
.search-bar input::placeholder{color:var(--gray-300)}

/* MESSAGE THREAD */
.message-item{display:flex;gap:12px;padding:14px 16px;border-bottom:1px solid var(--gray-50);cursor:pointer;transition:var(--t)}
.message-item:last-child{border-bottom:none}
.message-item:hover{background:var(--gray-50)}
.message-item.unread{background:#f0f7ff}
.message-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--primary)}
.message-subject{font-size:13px;font-weight:600;color:var(--navy)}
.message-subject.unread{color:var(--primary)}
.message-preview{font-size:12px;color:var(--gray-500);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:380px}
.unread-dot{width:7px;height:7px;border-radius:50%;background:var(--primary);flex-shrink:0}

/* PROFILE SECTIONS */
.profile-hero{background:linear-gradient(135deg,var(--navy),#0a3366);border-radius:var(--radius-lg);padding:28px;display:flex;align-items:center;gap:24px;margin-bottom:20px}
.profile-hero-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--primary-mid),var(--teal));display:flex;align-items:center;justify-content:center;font-family:'Lora',serif;font-size:26px;color:white;flex-shrink:0;border:3px solid rgba(255,255,255,.2)}
.profile-hero-name{font-family:'Lora',serif;font-size:22px;color:white}
.profile-hero-meta{font-size:13px;color:rgba(255,255,255,.55);margin-top:4px}
.profile-hero-actions{margin-left:auto;display:flex;gap:10px}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--gray-200);margin-bottom:20px}
.tab{padding:10px 20px;font-size:13px;font-weight:600;color:var(--gray-500);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:var(--t)}
.tab:hover{color:var(--primary)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* CALENDAR */
.calendar-wrap{background:white;border-radius:var(--radius);border:1px solid var(--gray-100);overflow:hidden}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--gray-100)}
.cal-title{font-family:'Lora',serif;font-size:16px;font-weight:600;color:var(--navy)}
.cal-nav{display:flex;gap:8px}
.cal-nav-btn{width:28px;height:28px;border-radius:var(--radius-sm);background:var(--gray-100);border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:var(--t)}
.cal-nav-btn:hover{background:var(--primary-light);color:var(--primary)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day-label{text-align:center;padding:8px 4px;font-size:11px;font-weight:700;color:var(--gray-500);text-transform:uppercase}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border-radius:var(--radius-sm);margin:2px;font-size:13px;font-weight:500;color:var(--gray-700);transition:var(--t);position:relative}
.cal-day:hover{background:var(--primary-light);color:var(--primary)}
.cal-day.today{background:var(--primary);color:white;font-weight:700}
.cal-day.has-appt::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--teal);position:absolute;bottom:3px}
.cal-day.today.has-appt::after{background:white}
.cal-day.other-month{color:var(--gray-300)}
.cal-day.selected{background:var(--primary-light);color:var(--primary);font-weight:700}

/* BILLING */
.bill-breakdown{background:var(--gray-50);border-radius:var(--radius);padding:16px 20px}
.bill-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px}
.bill-row+.bill-row{border-top:1px solid var(--gray-200)}
.bill-row.total{font-weight:700;font-size:14px;color:var(--navy)}
.bill-row.paid{color:var(--success)}

/* INSURANCE CARD */
.insurance-card{background:linear-gradient(135deg,#1a3a6e,var(--teal));border-radius:var(--radius-lg);padding:20px 24px;color:white;position:relative;overflow:hidden}
.insurance-card::after{content:'🛡';position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:48px;opacity:.1}
.ins-label{font-size:11px;opacity:.6;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.ins-value{font-size:15px;font-weight:600}
.ins-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}

/* CONTACT LIST */
.contact-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--t)}
.contact-item:hover{background:var(--gray-50)}
.contact-avatar{width:34px;height:34px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--primary);flex-shrink:0}
.contact-name{font-size:13px;font-weight:600;color:var(--navy)}
.contact-role{font-size:11px;color:var(--gray-400)}

/* FILE UPLOAD */
.file-drop{border:2px dashed var(--gray-200);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;transition:var(--t)}
.file-drop:hover{border-color:var(--primary);background:var(--primary-light)}
.file-drop-icon{font-size:28px;margin-bottom:8px}
.file-drop-text{font-size:13px;color:var(--gray-500)}
.file-drop-sub{font-size:11px;color:var(--gray-400);margin-top:4px}

/* SECTION DIVIDER */
.sec-divider{display:flex;align-items:center;gap:12px;margin:20px 0 16px}
.sec-divider-label{font-size:12px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.sec-divider-line{flex:1;height:1px;background:var(--gray-100)}

/* VITALS */
.vital-card{background:white;border:1px solid var(--gray-100);border-radius:var(--radius);padding:14px 16px;text-align:center}
.vital-icon{font-size:20px;margin-bottom:6px}
.vital-value{font-family:'Lora',serif;font-size:18px;font-weight:600;color:var(--navy)}
.vital-label{font-size:11px;color:var(--gray-500);margin-top:2px}
.vital-status{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;margin-top:4px;display:inline-block}
.vital-status.normal{background:var(--success-light);color:var(--success)}
.vital-status.elevated{background:var(--warning-light);color:#92400e}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast-wrap" class="toast-wrap"></div>
<div id="modal-root"></div>

<script>
const API = 'https://guardianapi-ftanbefefpf7hcg7.eastus2-01.azurewebsites.net/api';
let S = {
  screen:'login', authMode:'login', selectedRole:'Admin',
  user:null, page:'dashboard',
  data:{patients:[],providers:[],appointments:[],testOrders:[],testResults:[],messages:[],billing:[]},
  modal:null, modalData:null, unreadCount:0,
  calYear:new Date().getFullYear(), calMonth:new Date().getMonth(),
  searchQ:'', activeTab:0, selectedPatient:null, selectedProvider:null, selectedMessage:null
};

// ── UTILS ──
async function apiFetch(m,p,b){try{const r=await fetch(`${API}${p}`,{method:m,headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):undefined});const t=await r.text();let d;try{d=JSON.parse(t)}catch{d=t}return{ok:r.ok,status:r.status,data:d}}catch(e){return{ok:false,error:e.message}}}
function arr(x){if(!x)return[];return Array.isArray(x)?x:[x]}
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function fmtDateTime(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'})}
function initials(a,b){return((a||'')[0]||'').toUpperCase()+((b||'')[0]||'').toUpperCase()}
function $(id){return document.getElementById(id)}
let _tid=0;
function toast(msg,type='info'){const wrap=$('toast-wrap');const el=document.createElement('div');el.className=`toast ${type}`;el.innerHTML=`<span style="font-size:16px">${{success:'✓',error:'✕',info:'ℹ'}[type]||'ℹ'}</span><span class="toast-msg">${msg}</span>`;wrap.appendChild(el);setTimeout(()=>el.remove(),3500)}
function badge(t,c){return`<span class="badge badge-${c}">${t}</span>`}
function statusBadge(s){const m={Scheduled:'blue',Completed:'green',Cancelled:'red',Pending:'yellow',Paid:'green',Unpaid:'yellow',Low:'green',Medium:'yellow',High:'red',Normal:'green',Active:'green',Inactive:'gray'};return badge(s,m[s]||'gray')}
function emptyState(icon,title,desc){return`<div class="empty-state"><div class="empty-icon">${icon}</div><div class="empty-title">${title}</div><div class="empty-desc">${desc}</div></div>`}

// ── DATA ──
async function loadData(){
  const uid=S.user?.userId||1;
  const[pats,provs,appts,msgs,bills,results]=await Promise.all([
    apiFetch('GET','/patients'),apiFetch('GET','/providers'),
    apiFetch('GET',`/appointments/patient/1`),apiFetch('GET',`/messages/inbox/${uid}`),
    apiFetch('GET',`/billing/patient/1`),apiFetch('GET',`/testresults/patient/1`)
  ]);
  if(pats.ok)S.data.patients=arr(pats.data);
  if(provs.ok)S.data.providers=arr(provs.data);
  if(appts.ok)S.data.appointments=arr(appts.data);
  if(msgs.ok){S.data.messages=arr(msgs.data);S.unreadCount=S.data.messages.filter(m=>!m.isRead).length}
  if(bills.ok)S.data.billing=arr(bills.data);
  if(results.ok)S.data.testResults=arr(results.data);
  render();
}

// ── AUTH ──
async function doLogin(e){
  e.preventDefault();
  const email=$('l-email').value,pass=$('l-pass').value,err=$('l-err');
  err.style.display='none';
  const r=await apiFetch('POST','/login',{email,password:pass});
  if(r.ok&&r.data.userId){S.user=r.data;S.screen='app';S.page='dashboard';render();loadData()}
  else{err.textContent=r.data?.message||'Invalid email or password.';err.style.display='block'}
}
async function doRegister(e){
  e.preventDefault();
  const email=$('r-email').value,pass=$('r-pass').value,role=S.selectedRole;
  const err=$('r-err'),ok=$('r-ok');err.style.display='none';ok.style.display='none';
  const r=await apiFetch('POST','/register',{email,password:pass,role});
  if(r.ok){ok.textContent='Account created! Redirecting...';ok.style.display='block';setTimeout(()=>{S.authMode='login';render()},1600)}
  else{err.textContent=r.data?.message||'Registration failed.';err.style.display='block'}
}
function logout(){S.user=null;S.screen='login';S.data={patients:[],providers:[],appointments:[],testOrders:[],testResults:[],messages:[],billing:[]};S.unreadCount=0;render()}

// ── ROLE ──
function getRole(){return(S.selectedRole||'Admin').toLowerCase()}
function isAdmin(){return getRole()==='admin'}
function isProvider(){return getRole()==='provider'}
function isPatient(){return getRole()==='patient'}

// ── NAV CONFIG ──
function getNav(){
  if(isPatient()) return[
    {id:'dashboard',icon:'⊞',label:'My Dashboard'},
    {id:'my-providers',icon:'🩺',label:'My Providers'},
    {id:'appointments',icon:'📅',label:'Appointments'},
    {id:'testresults',icon:'🧬',label:'Test Results'},
    {id:'messages',icon:'💬',label:'Messages'},
    {id:'billing',icon:'💰',label:'Billing & Insurance'},
  ];
  if(isProvider()) return[
    {id:'dashboard',icon:'⊞',label:'Dashboard'},
    {id:'patients',icon:'👥',label:'Patient Directory'},
    {id:'appointments',icon:'📅',label:'Appointments'},
    {id:'testresults',icon:'🧬',label:'Test Results'},
    {id:'messages',icon:'💬',label:'Messages'},
  ];
  return[
    {id:'dashboard',icon:'⊞',label:'Dashboard'},
    {id:'patients',icon:'👥',label:'Patient Directory'},
    {id:'providers',icon:'🩺',label:'Providers'},
    {id:'appointments',icon:'📅',label:'Appointments'},
    {id:'testresults',icon:'🧬',label:'Test Results'},
    {id:'messages',icon:'💬',label:'Messages'},
    {id:'billing',icon:'💰',label:'Billing'},
  ];
}
const PAGE_TITLES={dashboard:'Dashboard','my-providers':'My Providers',patients:'Patient Directory',providers:'Providers',appointments:'Appointments',testresults:'Test Results',messages:'Messages',billing:'Billing & Insurance'};

// ── CALENDAR ──
function renderCalendar(appts){
  const now=new Date();
  const year=S.calYear,month=S.calMonth;
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const monthName=new Date(year,month).toLocaleString('default',{month:'long'});
  const apptDays=new Set(appts.map(a=>{const d=new Date(a.appointmentDate);return d.getFullYear()===year&&d.getMonth()===month?d.getDate():null}).filter(Boolean));
  let days='';
  for(let i=0;i<firstDay;i++) days+=`<div class="cal-day other-month"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const isToday=d===now.getDate()&&month===now.getMonth()&&year===now.getFullYear();
    const hasAppt=apptDays.has(d);
    days+=`<div class="cal-day ${isToday?'today':''} ${hasAppt?'has-appt':''}" onclick="calDayClick(${d})">${d}</div>`;
  }
  return`<div class="calendar-wrap">
    <div class="cal-header">
      <div class="cal-title">${monthName} ${year}</div>
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="S.calMonth--;if(S.calMonth<0){S.calMonth=11;S.calYear--}render()">‹</button>
        <button class="cal-nav-btn" onclick="S.calMonth++;if(S.calMonth>11){S.calMonth=0;S.calYear++}render()">›</button>
      </div>
    </div>
    <div style="padding:12px">
      <div class="cal-grid">
        ${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cal-day-label">${d}</div>`).join('')}
        ${days}
      </div>
    </div>
  </div>`;
}
function calDayClick(d){
  const appts=S.data.appointments.filter(a=>{const dt=new Date(a.appointmentDate);return dt.getDate()===d&&dt.getMonth()===S.calMonth&&dt.getFullYear()===S.calYear});
  if(appts.length>0)openModal('apptDetail',appts[0]);
  else openModal('addAppt');
}

// ══════════════════════════════════
// PAGES — SHARED DASHBOARD
// ══════════════════════════════════
function pageDashboard(){
  if(isPatient()) return pagePatientDashboard();
  if(isProvider()) return pageProviderDashboard();
  return pageAdminDashboard();
}

function pageAdminDashboard(){
  const{patients,providers,appointments,testResults,messages,billing}=S.data;
  const nextAppt=appointments.find(a=>a.status==='Scheduled');
  const totalOwed=billing.reduce((s,b)=>s+(b.patientOwes||0),0);
  return`<div class="page">
    <div class="welcome-banner">
      <div><div class="welcome-title">Welcome back, ${S.user?.email?.split('@')[0]||'Admin'} 👋</div><div class="welcome-sub">Guardian Genetics Admin Portal — full system overview</div></div>
      ${nextAppt?`<div class="welcome-next"><div class="welcome-next-label">Next Appointment</div><div class="welcome-next-value">${fmtDate(nextAppt.appointmentDate)}</div></div>`:''}
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-card-top"><div class="stat-icon-wrap blue">👥</div><span class="stat-trend neutral">Total</span></div><div class="stat-value">${patients.length}</div><div class="stat-label">Patients</div></div>
      <div class="stat-card"><div class="stat-card-top"><div class="stat-icon-wrap teal">🩺</div><span class="stat-trend neutral">Active</span></div><div class="stat-value">${providers.length}</div><div class="stat-label">Providers</div></div>
      <div class="stat-card"><div class="stat-card-top"><div class="stat-icon-wrap green">🧬</div><span class="stat-trend neutral">Done</span></div><div class="stat-value">${testResults.length}</div><div class="stat-label">Test Results</div></div>
      <div class="stat-card"><div class="stat-card-top"><div class="stat-icon-wrap yellow">💰</div><span class="stat-trend ${totalOwed>0?'up':'neutral'}">${totalOwed>0?'Due':'Clear'}</span></div><div class="stat-value">$${totalOwed.toFixed(0)}</div><div class="stat-label">Balance Due</div></div>
    </div>
    <div class="grid-2" style="gap:20px">
      <div class="card">
        <div class="card-header"><div><div class="card-title">Recent Appointments</div><div class="card-subtitle">${appointments.length} total</div></div><button class="btn btn-primary btn-sm" onclick="setPage('appointments')">View All</button></div>
        <div class="card-body" style="padding-top:12px">
          ${appointments.length===0?emptyState('📅','No appointments','Schedule the first appointment'):`<div class="timeline">${appointments.slice(0,4).map(a=>`<div class="timeline-item"><div class="timeline-dot ${a.status==='Completed'?'green':a.status==='Cancelled'?'gray':'blue'}">${a.status==='Completed'?'✓':'📅'}</div><div style="flex:1"><div class="timeline-title">${a.appointmentType||'Visit'}</div><div class="timeline-meta">${fmtDate(a.appointmentDate)}</div></div><div>${statusBadge(a.status)}</div></div>`).join('')}</div>`}
        </div>
      </div>
      <div class="card">
        <div class="card-header"><div><div class="card-title">Recent Messages</div><div class="card-subtitle">${S.unreadCount} unread</div></div><button class="btn btn-primary btn-sm" onclick="setPage('messages')">View All</button></div>
        <div class="card-body" style="padding-top:8px">
          ${messages.length===0?emptyState('💬','No messages','Inbox is empty'):`<div>${messages.slice(0,3).map(m=>`<div class="message-item ${!m.isRead?'unread':''}" onclick="openModal('viewMessage',${JSON.stringify(m).replace(/'/g,'&#39;')})"><div class="message-avatar">${(m.subject||'M')[0].toUpperCase()}</div><div style="flex:1;min-width:0"><div class="message-subject ${!m.isRead?'unread':''}">${m.subject||'(No subject)'}</div><div class="message-preview">${m.body||''}</div></div></div>`).join('')}</div>`}
        </div>
      </div>
    </div>
  </div>`;
}

function pageProviderDashboard(){
  const{patients,appointments,testResults,messages}=S.data;
  const upcoming=appointments.filter(a=>a.status==='Scheduled');
  return`<div class="page">
    <div class="welcome-banner">
      <div><div class="welcome-title">Good morning, Dr. ${S.user?.email?.split('@')[0]||'Provider'} 👋</div><div class="welcome-sub">You have ${upcoming.length} upcoming appointment${upcoming.length!==1?'s':''} today</div></div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-outline" style="border-color:rgba(255,255,255,.3);color:white" onclick="openModal('addAppt')">+ Schedule</button>
        <button class="btn" style="background:rgba(255,255,255,.15);color:white" onclick="openModal('addTestResult')">+ Add Result</button>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-card-top"><div class="stat-icon-wrap blue">👥</div></div><div class="stat-value">${patients.length}</div><div class="stat-label">My Patients</div></div>
      <div class="stat-card"><div class="stat-card-top"><div class="stat-icon-wrap yellow">📅</div></div><div class="stat-value">${upcoming.length}</div><div class="stat-label">Upcoming Appointments</div></div>
      <div class="stat-card"><div class="stat-card-top"><div class="stat-icon-wrap green">🧬</div></div><div class="stat-value">${testResults.length}</div><div class="stat-label">Results Issued</div></div>
      <div class="stat-card"><div class="stat-card-top"><div class="stat-icon-wrap teal">💬</div></div><div class="stat-value">${S.unreadCount}</div><div class="stat-label">Unread Messages</div></div>
    </div>
    <div class="grid-2" style="gap:20px">
      <div>
        ${renderCalendar(appointments)}
      </div>
      <div style="display:flex;flex-direction:column;gap:16px">
        <div class="card">
          <div class="card-header"><div class="card-title">Upcoming Appointments</div></div>
          <div class="card-body" style="padding-top:12px">
            ${upcoming.length===0?emptyState('📅','No upcoming appointments',''):`<div class="timeline">${upcoming.slice(0,4).map(a=>`<div class="timeline-item" style="cursor:pointer" onclick="openModal('apptDetail',${JSON.stringify(a).replace(/'/g,'&#39;')})"><div class="timeline-dot blue">📅</div><div style="flex:1"><div class="timeline-title">${a.appointmentType||'Visit'}</div><div class="timeline-meta">${fmtDateTime(a.appointmentDate)}</div></div><div>${statusBadge(a.status)}</div></div>`).join('')}</div>`}
          </div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">Recent Messages</div><button class="btn btn-primary btn-sm" onclick="setPage('messages')">View All</button></div>
          <div class="card-body" style="padding-top:8px">
            ${messages.slice(0,3).map(m=>`<div class="message-item ${!m.isRead?'unread':''}" onclick="openModal('viewMessage',${JSON.stringify(m).replace(/'/g,'&#39;')})"><div class="message-avatar">${(m.subject||'M')[0].toUpperCase()}</div><div style="flex:1;min-width:0"><div class="message-subject ${!m.isRead?'unread':''}">${m.subject||'(No subject)'}</div><div class="message-preview">${m.body||''}</div></div></div>`).join('')}
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function pagePatientDashboard(){
  const{appointments,testResults,messages,billing}=S.data;
  const nextAppt=appointments.find(a=>a.status==='Scheduled');
  const totalOwed=billing.reduce((s,b)=>s+(b.patientOwes||0),0);
  return`<div class="page">
    <div class="welcome-banner">
      <div><div class="welcome-title">Hello, ${S.user?.email?.split('@')[0]||'Patient'} 👋</div><div class="welcome-sub">Your health summary at a glance</div></div>
      ${nextAppt?`<div class="welcome-next"><div class="welcome-next-label">Next Appointment</div><div class="welcome-next-value">${fmtDate(nextAppt.appointmentDate)}</div><div style="font-size:11px;color:rgba(255,255,255,.4);margin-top:2px">${nextAppt.appointmentType||'Telehealth'}</div></div>`:''}
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-card-top"><div class="stat-icon-wrap blue">📅</div></div><div class="stat-value">${appointments.length}</div><div class="stat-label">Appointments</div></div>
      <div class="stat-card"><div class="stat-card-top"><div class="stat-icon-wrap green">🧬</div></div><div class="stat-value">${testResults.length}</div><div class="stat-label">Test Results</div></div>
      <div class="stat-card"><div class="stat-card-top"><div class="stat-icon-wrap teal">💬</div></div><div class="stat-value">${S.unreadCount}</div><div class="stat-label">Unread Messages</div></div>
      <div class="stat-card"><div class="stat-card-top"><div class="stat-icon-wrap yellow">💰</div><span class="stat-trend ${totalOwed>0?'up':'neutral'}">${totalOwed>0?'Due':'Paid'}</span></div><div class="stat-value">$${totalOwed.toFixed(0)}</div><div class="stat-label">Balance Due</div></div>
    </div>
    <div class="grid-2" style="gap:20px">
      <div class="card">
        <div class="card-header"><div class="card-title">My Appointments</div><button class="btn btn-primary btn-sm" onclick="setPage('appointments')">View All</button></div>
        <div class="card-body" style="padding-top:12px">
          ${renderCalendar(appointments)}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:16px">
        <div class="card">
          <div class="card-header"><div class="card-title">Latest Test Results</div><button class="btn btn-primary btn-sm" onclick="setPage('testresults')">View All</button></div>
          <div class="card-body" style="padding-top:12px">
            ${testResults.length===0?emptyState('🧬','No results yet',''):`<div class="timeline">${testResults.slice(0,3).map(t=>`<div class="timeline-item" style="cursor:pointer" onclick="openModal('viewTestResult',${JSON.stringify(t).replace(/'/g,'&#39;')})"><div class="timeline-dot ${t.riskLevel==='Low'?'green':'yellow'}">🧬</div><div style="flex:1"><div class="timeline-title">${t.resultSummary||'Genetic Panel'}</div><div class="timeline-meta">${fmtDate(t.resultDate)}</div></div><div>${statusBadge(t.riskLevel||'Unknown')}</div></div>`).join('')}</div>`}
          </div>
        </div>
        <div class="card">

// MODALS
// ══════════════════════════════════
function openModal(type,data){S.modal=type;S.modalData=data||null;renderModal()}
function closeModal(){S.modal=null;S.modalData=null;$('modal-root').innerHTML=''}

function renderModal(){
  const root=$('modal-root');if(!S.modal){root.innerHTML='';return}
  let body='',large=false;
  const d=S.modalData;

  if(S.modal==='viewPatient'&&d){
    large=true;
    body=`<div class="modal-head"><div class="modal-title">Patient Profile</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="profile-hero">
        <div class="profile-hero-avatar">${initials(d.firstName,d.lastName)}</div>
        <div style="flex:1"><div class="profile-hero-name">${d.firstName} ${d.lastName}</div><div class="profile-hero-meta">Patient ID #${d.patientId} · DOB: ${fmtDate(d.dateOfBirth)} · ${d.gender||'—'}</div><div class="profile-hero-meta" style="margin-top:4px">${d.phone||''} · ${d.city?`${d.city}, ${d.state}`:''}</div></div>
        <div class="profile-hero-actions">
          <button class="btn btn-sm" style="background:rgba(255,255,255,.15);color:white" onclick="closeModal();openModal('addAppt')">📅 Schedule</button>
          <button class="btn btn-sm" style="background:rgba(255,255,255,.15);color:white" onclick="closeModal();openModal('sendMsg')">💬 Message</button>
        </div>
      </div>
      <div class="tabs">
        <div class="tab ${S.activeTab===0?'active':''}" onclick="S.activeTab=0;renderModal()">Overview</div>
        <div class="tab ${S.activeTab===1?'active':''}" onclick="S.activeTab=1;renderModal()">Vitals</div>
        <div class="tab ${S.activeTab===2?'active':''}" onclick="S.activeTab=2;renderModal()">Insurance</div>
        <div class="tab ${S.activeTab===3?'active':''}" onclick="S.activeTab=3;renderModal()">Medical History</div>
      </div>
      ${S.activeTab===0?`
        <div class="grid-2" style="gap:14px;margin-bottom:16px">
          <div class="card" style="padding:14px 16px"><div style="font-size:12px;color:var(--gray-500)">Recent Appointments</div><div style="font-family:'Lora',serif;font-size:22px;color:var(--navy);margin-top:4px">${S.data.appointments.length}</div></div>
          <div class="card" style="padding:14px 16px"><div style="font-size:12px;color:var(--gray-500)">Test Results</div><div style="font-family:'Lora',serif;font-size:22px;color:var(--navy);margin-top:4px">${S.data.testResults.length}</div></div>
        </div>
        <div style="font-size:13px;font-weight:600;color:var(--navy);margin-bottom:10px">Recent Test Results</div>
        ${S.data.testResults.slice(0,3).map(t=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px;background:var(--gray-50);border-radius:var(--radius-sm);margin-bottom:8px"><div><div style="font-size:13px;font-weight:600;color:var(--navy)">${t.resultSummary||'Test'}</div><div style="font-size:11px;color:var(--gray-500)">${fmtDate(t.resultDate)}</div></div>${statusBadge(t.riskLevel||'Unknown')}</div>`).join('')}
      `:''}
      ${S.activeTab===1?`
        <div class="grid-4" style="grid-template-columns:repeat(4,1fr);gap:10px">
          <div class="vital-card"><div class="vital-icon">❤️</div><div class="vital-value">72 bpm</div><div class="vital-label">Heart Rate</div><div class="vital-status normal">Normal</div></div>
          <div class="vital-card"><div class="vital-icon">🩸</div><div class="vital-value">118/76</div><div class="vital-label">Blood Pressure</div><div class="vital-status normal">Normal</div></div>
          <div class="vital-card"><div class="vital-icon">🌡️</div><div class="vital-value">98.6°F</div><div class="vital-label">Temperature</div><div class="vital-status normal">Normal</div></div>
          <div class="vital-card"><div class="vital-icon">⚖️</div><div class="vital-value">145 lbs</div><div class="vital-label">Weight</div><div class="vital-status normal">Normal</div></div>
        </div>
      `:''}
      ${S.activeTab===2?`
        <div class="insurance-card" style="margin-bottom:16px">
          <div class="ins-label" style="margin-bottom:8px">Insurance Provider</div>
          <div class="ins-value" style="font-size:18px">BlueCross BlueShield</div>
          <div class="ins-grid">
            <div><div class="ins-label">Member ID</div><div class="ins-value">***-**-4821</div></div>
            <div><div class="ins-label">Group Number</div><div class="ins-value">GRP-00291</div></div>
            <div><div class="ins-label">Coverage</div><div class="ins-value">80% In-Network</div></div>
            <div><div class="ins-label">Status</div><div><span style="background:rgba(0,166,81,.2);color:#4ade80;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:600">Active</span></div></div>
          </div>
        </div>
      `:''}
      ${S.activeTab===3?`
        <div class="file-drop" onclick="toast('File upload coming with backend integration','info')">
          <div class="file-drop-icon">📁</div>
          <div class="file-drop-text">Upload Medical History</div>
          <div class="file-drop-sub">PDF, DOCX, images up to 25MB — from any previous provider</div>
        </div>
        <div style="margin-top:16px;font-size:13px;color:var(--gray-500);text-align:center">No medical history records uploaded yet</div>
      `:''}
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeModal()">Close</button>
      <button class="btn btn-primary" onclick="closeModal();openModal('addAppt')">Schedule Appointment</button>
    </div>`;
  }

  else if(S.modal==='viewProvider'&&d){
    body=`<div class="modal-head"><div class="modal-title">Provider Profile</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="profile-hero">
        <div class="profile-hero-avatar">${initials(d.firstName,d.lastName)}</div>
        <div style="flex:1">
          <div class="profile-hero-name">${d.firstName} ${d.lastName}</div>
          <div class="profile-hero-meta">${d.specialty||'Specialist'} · ${d.phone||''}</div>
          <div style="margin-top:8px">${d.isAcceptingPatients?badge('Accepting Patients','green'):badge('Not Accepting','red')}</div>
        </div>
      </div>
      <div style="font-size:14px;color:var(--gray-700);line-height:1.7;margin-bottom:16px">${d.bio||'No bio available.'}</div>
      <div class="grid-2" style="gap:10px">
        <div style="background:var(--gray-50);padding:12px;border-radius:var(--radius-sm)"><div style="font-size:11px;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Specialization</div><div style="font-weight:600;color:var(--navy)">${d.specialty||'—'}</div></div>
        <div style="background:var(--gray-50);padding:12px;border-radius:var(--radius-sm)"><div style="font-size:11px;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Credentials</div><div style="font-weight:600;color:var(--navy)">MD, PhD — Genetics</div></div>
        <div style="background:var(--gray-50);padding:12px;border-radius:var(--radius-sm)"><div style="font-size:11px;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Certifications</div><div style="font-weight:600;color:var(--navy)">ABMG Certified</div></div>
        <div style="background:var(--gray-50);padding:12px;border-radius:var(--radius-sm)"><div style="font-size:11px;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Facility</div><div style="font-weight:600;color:var(--navy)">Guardian Genetics</div></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeModal()">Close</button>
      <button class="btn btn-outline" onclick="closeModal();openModal('sendMsg')">💬 Message</button>
      <button class="btn btn-primary" onclick="closeModal();openModal('addAppt')">📅 Schedule Appointment</button>
    </div>`;
  }

  else if(S.modal==='viewTestResult'&&d){
    large=true;
    body=`<div class="modal-head"><div class="modal-title">Test Result Details</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <div><div style="font-family:'Lora',serif;font-size:20px;color:var(--navy)">${d.resultSummary||'Genetic Panel'}</div><div style="font-size:13px;color:var(--gray-500);margin-top:4px">Result Date: ${fmtDate(d.resultDate)} · Reviewed by: ${d.reviewedBy||'Provider'}</div></div>
        ${statusBadge(d.riskLevel||'Unknown')}
      </div>
      <div class="grid-2" style="gap:14px;margin-bottom:16px">
        <div style="background:var(--gray-50);padding:14px;border-radius:var(--radius)"><div style="font-size:11px;color:var(--gray-500);text-transform:uppercase;margin-bottom:6px">Test Type</div><div style="font-weight:600;color:var(--navy)">BRCA1/BRCA2 Gene Mutation Panel</div></div>
        <div style="background:var(--gray-50);padding:14px;border-radius:var(--radius)"><div style="font-size:11px;color:var(--gray-500);text-transform:uppercase;margin-bottom:6px">Ordered By</div><div style="font-weight:600;color:var(--navy)">${d.reviewedBy||'Dr. Sarah Johnson'}</div></div>
        <div style="background:var(--gray-50);padding:14px;border-radius:var(--radius)"><div style="font-size:11px;color:var(--gray-500);text-transform:uppercase;margin-bottom:6px">Result</div><div style="font-weight:600;color:var(--success)">${d.resultSummary||'No pathogenic variants detected'}</div></div>
        <div style="background:var(--gray-50);padding:14px;border-radius:var(--radius)"><div style="font-size:11px;color:var(--gray-500);text-transform:uppercase;margin-bottom:6px">Risk Level</div>${statusBadge(d.riskLevel||'Low')}</div>
      </div>
      ${d.clinicalNotes?`<div style="background:var(--primary-light);padding:14px;border-radius:var(--radius);margin-bottom:16px"><div style="font-size:12px;font-weight:600;color:var(--primary);margin-bottom:6px">📝 Clinical Notes</div><div style="font-size:13px;color:var(--gray-700)">${d.clinicalNotes}</div></div>`:''}
      <div class="sec-divider"><div class="sec-divider-label">Supporting Documents</div><div class="sec-divider-line"></div></div>
      <div class="file-drop" onclick="toast('File upload requires backend storage integration','info')">
        <div class="file-drop-icon">📎</div>
        <div class="file-drop-text">Supporting documents</div>
        <div class="file-drop-sub">No documents attached · Click to upload</div>
      </div>
      ${!isPatient()?`<div style="margin-top:16px"><div style="font-size:13px;font-weight:600;color:var(--navy);margin-bottom:8px">Add Notes</div><textarea class="form-control" rows="3" placeholder="Add clinical notes..."></textarea></div>`:''}
    </div>
    <div class="modal-foot"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>`;
  }

  else if(S.modal==='viewMessage'&&d){
    large=true;
    body=`<div class="modal-head"><div class="modal-title">${d.subject||'Message'}</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div style="display:flex;align-items:center;gap:12px;padding:14px;background:var(--gray-50);border-radius:var(--radius);margin-bottom:16px">
        <div class="message-avatar">${(d.subject||'M')[0].toUpperCase()}</div>
        <div><div style="font-size:13px;font-weight:600;color:var(--navy)">From: User #${d.senderId||'—'}</div><div style="font-size:12px;color:var(--gray-500)">To: User #${d.receiverId||'—'}</div></div>
        ${!d.isRead?`<div style="margin-left:auto"><button class="btn btn-outline btn-sm" onclick="markRead(${d.messageId})">Mark Read</button></div>`:''}
      </div>
      <div style="font-size:14px;color:var(--gray-700);line-height:1.8;padding:0 4px;margin-bottom:20px">${d.body||''}</div>
      <div class="file-drop" onclick="toast('File attachment coming with storage integration','info')">
        <div class="file-drop-icon">📎</div>
        <div class="file-drop-text">Attach a file</div>
        <div class="file-drop-sub">PDF, images, documents up to 25MB</div>
      </div>
      <div class="sec-divider"><div class="sec-divider-label">Reply</div><div class="sec-divider-line"></div></div>
      <div class="form-field"><label class="form-label">CC</label><input class="form-control" placeholder="Add recipients..." id="msg-cc"></div>
      <div class="form-field"><textarea class="form-control" rows="4" placeholder="Write your reply..." id="msg-reply"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeModal()">Close</button>
      <button class="btn btn-primary" onclick="toast('Reply sent','success');closeModal()">Send Reply</button>
    </div>`;
  }

  else if(S.modal==='apptDetail'&&d){
    large=true;
    body=`<div class="modal-head"><div class="modal-title">Appointment Details</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div style="background:var(--primary-light);border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between">
        <div><div style="font-family:'Lora',serif;font-size:18px;color:var(--navy)">${d.appointmentType||'Appointment'}</div><div style="font-size:13px;color:var(--gray-600);margin-top:4px">${fmtDateTime(d.appointmentDate)}</div></div>
        ${statusBadge(d.status)}
      </div>
      ${d.appointmentType==='Telehealth'?`<div style="background:#e8f5e9;border:1px solid #a5d6a7;border-radius:var(--radius);padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between"><div><div style="font-size:13px;font-weight:600;color:#2e7d32">📹 Telehealth Meeting</div><div style="font-size:12px;color:#388e3c;margin-top:3px">Zoom meeting will be set up automatically</div></div><button class="btn btn-success btn-sm" onclick="toast('Opening Zoom meeting...','info')">Join Meeting</button></div>`:''}
      ${d.notes?`<div style="background:var(--gray-50);padding:14px;border-radius:var(--radius);margin-bottom:16px"><div style="font-size:12px;font-weight:600;color:var(--gray-500);margin-bottom:6px">Notes</div><div style="font-size:13px;color:var(--gray-700)">${d.notes}</div></div>`:''}
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-outline" onclick="toast('Adding to Google Calendar...','info')">📅 Add to Google Calendar</button>
        <button class="btn btn-outline" onclick="toast('Adding to Apple Calendar...','info')">🍎 Add to Apple Calendar</button>
        ${d.status==='Scheduled'?`<button class="btn btn-success btn-sm" onclick="updateAppt(${d.appointmentId},'Completed');closeModal()">✓ Mark Complete</button><button class="btn btn-danger btn-sm" onclick="updateAppt(${d.appointmentId},'Cancelled');closeModal()">✕ Cancel</button>`:''}
      </div>
    </div>
    <div class="modal-foot"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>`;
  }

  else if(S.modal==='viewBill'&&d){
    body=`<div class="modal-head"><div class="modal-title">Bill Details</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div style="font-family:'Lora',serif;font-size:18px;color:var(--navy);margin-bottom:4px">${d.description||'Service'}</div>
      <div style="margin-bottom:16px">${statusBadge(d.status)}</div>
      <div class="bill-breakdown">
        <div class="bill-row"><span>Total Charges</span><span>$${(d.totalAmount||0).toFixed(2)}</span></div>
        <div class="bill-row"><span>Insurance Covered</span><span style="color:var(--success)">-$${(d.insuranceCovered||0).toFixed(2)}</span></div>
        <div class="bill-row total"><span>Patient Responsibility</span><span style="color:${d.patientOwes>0?'var(--danger)':'var(--success)'}">$${(d.patientOwes||0).toFixed(2)}</span></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeModal()">Close</button>
      ${d.status!=='Paid'?`<button class="btn btn-success" onclick="payBill(${d.billId});closeModal()">Mark as Paid</button>`:''}
    </div>`;
  }

  else if(S.modal==='addPatient'){
    body=`<div class="modal-head"><div class="modal-title">Add New Patient</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="grid-2"><div class="form-field"><label class="form-label">First Name</label><input class="form-control" id="m-fn" placeholder="Jane"></div><div class="form-field"><label class="form-label">Last Name</label><input class="form-control" id="m-ln" placeholder="Doe"></div></div>
      <div class="grid-2"><div class="form-field"><label class="form-label">Date of Birth</label><input class="form-control" id="m-dob" type="date"></div><div class="form-field"><label class="form-label">Gender</label><select class="form-control" id="m-gnd"><option>Female</option><option>Male</option><option>Other</option></select></div></div>
      <div class="form-field"><label class="form-label">Phone</label><input class="form-control" id="m-ph" placeholder="410-555-0000"></div>
      <div class="grid-2"><div class="form-field"><label class="form-label">City</label><input class="form-control" id="m-cy" placeholder="Salisbury"></div><div class="form-field"><label class="form-label">State</label><input class="form-control" id="m-st" placeholder="MD"></div></div>
    </div>
    <div class="modal-foot"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="submitPatient()">Add Patient</button></div>`;
  }

  else if(S.modal==='addAppt'){
    body=`<div class="modal-head"><div class="modal-title">Schedule Appointment</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-field"><label class="form-label">Date & Time</label><input class="form-control" id="m-adt" type="datetime-local"></div>
      <div class="form-field"><label class="form-label">Type</label><select class="form-control" id="m-aty" onchange="if(this.value==='Telehealth')document.getElementById('zoom-note').style.display='block';else document.getElementById('zoom-note').style.display='none'"><option>Telehealth</option><option>In-Person</option><option>Follow-Up</option><option>Consultation</option></select></div>
      <div id="zoom-note" style="background:#e8f5e9;border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:#2e7d32;margin-bottom:14px">📹 Zoom meeting will be created automatically for this appointment</div>
      <div class="form-field"><label class="form-label">Notes</label><textarea class="form-control" id="m-ant" rows="3" placeholder="Optional notes..."></textarea></div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-outline btn-sm" onclick="toast('Google Calendar sync coming soon','info')">📅 Sync to Google</button>
        <button class="btn btn-outline btn-sm" onclick="toast('Apple Calendar sync coming soon','info')">🍎 Sync to Apple</button>
      </div>
    </div>
    <div class="modal-foot"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="submitAppt()">Schedule</button></div>`;
  }

  else if(S.modal==='addTestResult'){
    large=true;
    body=`<div class="modal-head"><div class="modal-title">Add Test Result</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-field"><label class="form-label">Patient</label><select class="form-control" id="m-tpat"><option value="1">Jane Doe — #1</option>${S.data.patients.map(p=>`<option value="${p.patientId}">${p.firstName} ${p.lastName} — #${p.patientId}</option>`).join('')}</select></div>
      <div class="grid-2">
        <div class="form-field"><label class="form-label">Test Type</label><select class="form-control" id="m-ttype"><option>BRCA1/BRCA2 Panel</option><option>Whole Genome Sequencing</option><option>Chromosomal Microarray</option><option>Carrier Screening</option><option>Pharmacogenomics</option></select></div>
        <div class="form-field"><label class="form-label">Risk Level</label><select class="form-control" id="m-trisk"><option>Low</option><option>Medium</option><option>High</option></select></div>
      </div>
      <div class="form-field"><label class="form-label">Result Summary</label><input class="form-control" id="m-tsum" placeholder="e.g. No pathogenic variants detected"></div>
      <div class="form-field"><label class="form-label">Clinical Notes</label><textarea class="form-control" id="m-tnotes" rows="3" placeholder="Add clinical notes..."></textarea></div>
      <div class="sec-divider"><div class="sec-divider-label">Supporting Documents</div><div class="sec-divider-line"></div></div>
      <div class="file-drop" onclick="toast('File storage integration coming soon','info')">
        <div class="file-drop-icon">📎</div>
        <div class="file-drop-text">Upload supporting documents</div>
        <div class="file-drop-sub">PDF, images, lab reports up to 25MB</div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="submitTestResult()">Save Result</button></div>`;
  }

  else if(S.modal==='sendMsg'){
    body=`<div class="modal-head"><div class="modal-title">New Message</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-field"><label class="form-label">To (User ID)</label><input class="form-control" id="m-mto" type="number" placeholder="1"></div>
      <div class="form-field"><label class="form-label">CC</label><input class="form-control" id="m-mcc" placeholder="Add CC recipients..."></div>
      <div class="form-field"><label class="form-label">Subject</label><input class="form-control" id="m-msub" placeholder="Subject..."></div>
      <div class="form-field"><label class="form-label">Message</label><textarea class="form-control" id="m-mbody" rows="4" placeholder="Write your message..."></textarea></div>
      <div class="file-drop" onclick="toast('File attachment coming soon','info')" style="margin-top:4px">
        <div class="file-drop-icon">📎</div><div class="file-drop-text">Attach a file</div><div class="file-drop-sub">Click to browse</div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="submitMsg()">Send Message</button></div>`;
  }

  else if(S.modal==='addBill'){
    body=`<div class="modal-head"><div class="modal-title">Add Bill</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-field"><label class="form-label">Description</label><input class="form-control" id="m-bdesc" placeholder="Genetic Counseling Session"></div>
      <div class="form-field"><label class="form-label">Insurance Policy</label><select class="form-control" id="m-bins-policy"><option>BlueCross BlueShield PPO</option><option>Aetna HMO</option><option>UnitedHealth Choice Plus</option><option>Cigna Open Access</option><option>Humana Gold Plus</option><option>Medicare Part B</option><option>Medicaid</option><option>No Insurance</option></select></div>
      <div class="grid-2">
        <div class="form-field"><label class="form-label">Total Amount ($)</label><input class="form-control" id="m-btot" type="number" placeholder="350" oninput="autoCalcBill()"></div>
        <div class="form-field"><label class="form-label">Insurance Covered ($)</label><input class="form-control" id="m-binsamt" type="number" placeholder="280" oninput="autoCalcBill()"></div>
      </div>
      <div style="background:var(--gray-50);padding:12px;border-radius:var(--radius-sm);font-size:13px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:var(--gray-500)">Patient Responsibility</span><span id="m-bowed" style="font-weight:700;color:var(--navy)">$0.00</span></div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="submitBill()">Add Bill</button></div>`;
  }

  else if(S.modal==='updateInsurance'){
    body=`<div class="modal-head"><div class="modal-title">Update Insurance</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-field"><label class="form-label">Insurance Provider</label><select class="form-control"><option>BlueCross BlueShield</option><option>Aetna</option><option>UnitedHealth</option><option>Cigna</option><option>Humana</option><option>Medicare</option><option>Medicaid</option></select></div>
      <div class="grid-2">
        <div class="form-field"><label class="form-label">Member ID</label><input class="form-control" placeholder="Member ID"></div>
        <div class="form-field"><label class="form-label">Group Number</label><input class="form-control" placeholder="Group #"></div>
      </div>
      <div class="file-drop"><div class="file-drop-icon">🪪</div><div class="file-drop-text">Upload Insurance Card</div><div class="file-drop-sub">Front and back</div></div>
    </div>
    <div class="modal-foot"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="toast('Insurance updated','success');closeModal()">Save</button></div>`;
  }

  root.innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal ${large?'modal-lg':''}">${body}</div></div>`;
}

function autoCalcBill(){
  const tot=parseFloat($('m-btot')?.value||0);
  const ins=parseFloat($('m-binsamt')?.value||0);
  const owed=$('m-bowed');
  if(owed) owed.textContent=`$${Math.max(0,tot-ins).toFixed(2)}`;
}

// ── ACTIONS ──
async function submitPatient(){const r=await apiFetch('POST','/patients',{userId:S.user.userId,firstName:$('m-fn').value,lastName:$('m-ln').value,dateOfBirth:$('m-dob').value,gender:$('m-gnd').value,phone:$('m-ph').value,city:$('m-cy').value,state:$('m-st').value});if(r.ok){toast('Patient added','success');closeModal();loadData()}else toast('Failed to add patient','error')}
async function submitAppt(){const r=await apiFetch('POST','/appointments',{patientId:1,providerId:1,appointmentDate:$('m-adt').value,appointmentType:$('m-aty').value,notes:$('m-ant').value});if(r.ok){toast('Appointment scheduled','success');closeModal();loadData()}else toast('Failed','error')}
async function updateAppt(id,status){const r=await apiFetch('PUT',`/appointments/${id}/status`,{status});if(r.ok){toast(`Marked ${status}`,'success');loadData()}else toast('Failed','error')}
async function submitTestResult(){const r=await apiFetch('POST','/testresults',{testOrderId:1,resultSummary:$('m-tsum').value,riskLevel:$('m-trisk').value,clinicalNotes:$('m-tnotes').value,reviewedBy:S.user?.email,resultDate:new Date().toISOString()});if(r.ok){toast('Result saved','success');closeModal();loadData()}else toast('Failed to save result','error')}
async function submitMsg(){const r=await apiFetch('POST','/messages',{senderId:S.user.userId,receiverId:parseInt($('m-mto').value),subject:$('m-msub').value,body:$('m-mbody').value});if(r.ok){toast('Message sent','success');closeModal();loadData()}else toast('Failed','error')}
async function markRead(id){const r=await apiFetch('PUT',`/messages/${id}/read`,{});if(r.ok){toast('Marked as read','success');loadData()}}
async function submitBill(){const tot=parseFloat($('m-btot').value),ins=parseFloat($('m-binsamt').value);const r=await apiFetch('POST','/billing',{patientId:1,providerId:1,description:$('m-bdesc').value,totalAmount:tot,insuranceCovered:ins,patientOwes:tot-ins});if(r.ok){toast('Bill added','success');closeModal();loadData()}else toast('Failed','error')}
async function payBill(id){const r=await apiFetch('PUT',`/billing/${id}/pay`,{});if(r.ok){toast('Bill marked paid','success');loadData()}else toast('Failed','error')}

// ── NAV ──
